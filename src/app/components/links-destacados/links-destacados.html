@if (links().length) {
  <aside class="links-section" aria-label="Enlaces externos">
    <div class="links-section__sticky">
      <div class="links-list">
        @for (link of links(); track link.id) {
          <a [href]="link.url" target="_blank" rel="noopener noreferrer">
            <span>{{ link.titulo }}</span>
            <strong>Abrir</strong>
          </a>
        }
      </div>
    </div>
  </aside>
}
