<button
  type="button"
  class="share-trigger"
  [attr.aria-label]="'Compartir ' + titulo()"
  (click)="abrir(compartirDialog)"
>
  <svg aria-hidden="true" viewBox="0 0 24 24">
    <circle cx="18" cy="5" r="2.5" />
    <circle cx="6" cy="12" r="2.5" />
    <circle cx="18" cy="19" r="2.5" />
    <path d="m8.2 10.8 7.6-4.5M8.2 13.2l7.6 4.5" />
  </svg>
  Compartir
</button>

<dialog
  #compartirDialog
  class="share-dialog"
  aria-label="Compartir evento"
  (click)="cerrarDesdeFondo($event, compartirDialog)"
>
  <div class="share-dialog__surface">
    <header class="share-dialog__header">
      <h2>Compartir</h2>
      <button
        type="button"
        class="share-dialog__close"
        aria-label="Cerrar opciones para compartir"
        (click)="cerrar(compartirDialog)"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18" /></svg>
      </button>
    </header>

    <div class="share-networks" aria-label="Redes sociales">
      <a
        class="share-network share-network--whatsapp"
        [href]="urlWhatsApp()"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Compartir ' + titulo() + ' en WhatsApp'"
        (click)="cerrar(compartirDialog)"
      >
        <span class="share-network__icon">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26C2.168 6.441 6.603 2.007 12.055 2.007c2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
          </svg>
        </span>
        <span>WhatsApp</span>
      </a>

      <a
        class="share-network share-network--facebook"
        [href]="urlFacebook()"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Compartir ' + titulo() + ' en Facebook'"
        (click)="cerrar(compartirDialog)"
      >
        <span class="share-network__icon">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M9.101 23.691v-7.98H6.627v-3.667h2.474v-1.58c0-4.085 1.848-5.978 5.858-5.978.401 0 .955.042 1.468.103a8.68 8.68 0 0 1 1.141.195v3.325a8.623 8.623 0 0 0-.653-.036 26.805 26.805 0 0 0-.733-.009c-.707 0-1.259.096-1.675.309a1.686 1.686 0 0 0-.679.622c-.258.42-.374.995-.374 1.752v1.297h3.919l-.386 2.103-.287 1.564h-3.246v8.245C19.396 23.238 24 18.179 24 12.044c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.628 3.874 10.35 9.101 11.647Z" />
          </svg>
        </span>
        <span>Facebook</span>
      </a>

      <a
        class="share-network share-network--x"
        [href]="urlTwitter()"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Compartir ' + titulo() + ' en X'"
        (click)="cerrar(compartirDialog)"
      >
        <span class="share-network__icon">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z" />
          </svg>
        </span>
        <span>X</span>
      </a>
    </div>

    <label class="share-link">
      <span>Enlace del evento</span>
      <span class="share-link__field">
        <input
          #manualUrl
          type="text"
          readonly
          [value]="url()"
          (focus)="seleccionarUrl(manualUrl)"
          (click)="seleccionarUrl(manualUrl)"
        />
        <button type="button" (click)="copiar()">Copiar</button>
      </span>
    </label>

    @if (mensaje()) {
      <p class="share-feedback" role="status" aria-live="polite">{{ mensaje() }}</p>
    }
    @if (error()) {
      <p class="share-feedback share-feedback--error" role="alert">{{ error() }}</p>
    }
  </div>
</dialog>
